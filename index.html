<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dobór Ramy Rowerowej</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 30px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #1e88e5;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #1565c0;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #e3f2fd;
      border-radius: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Dobór Ramy Rowerowej</h1>

    <label>Wzrost (cm)</label>
    <input type="number" id="height" placeholder="Np. 178">

    <label>Typ roweru</label>
    <select id="bikeType">
      <option value="mtb">MTB</option>
      <option value="gravel">Gravel</option>
      <option value="szosa">Szosa</option>
      <option value="trekking">Trekking</option>
    </select>

    <button onclick="dobierzRame()">Dobierz ramę</button>

    <div class="result" id="result">
      Tutaj pojawi się wynik.
    </div>
  </div>

  <script>
    function dobierzRame() {
      const height = parseInt(document.getElementById("height").value);
      const bikeType = document.getElementById("bikeType").value;

      let frameSize = "";

      if (bikeType === "mtb") {

        if (height < 165) {
          frameSize = "S";
        } else if (height < 175) {
          frameSize = "M";
        } else if (height < 185) {
          frameSize = "L";
        } else {
          frameSize = "XL";
        }

      } else {

        if (height < 170) {
          frameSize = "52";
        } else if (height < 178) {
          frameSize = "54";
        } else if (height < 185) {
          frameSize = "56";
        } else {
          frameSize = "58+";
        }
      }

      document.getElementById("result").innerHTML =
        `Polecany rozmiar ramy: <strong>${frameSize}</strong>`;
    }
  </script>

</body>
</html>
